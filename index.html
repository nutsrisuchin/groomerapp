<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7c5cff" />
  <!-- Lets staff "Add to Home Screen" on iPhone and get a fullscreen, app-like launch -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Groomingdale" />
  <title>Groomingdale</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ============ LOGIN GATE (shop PIN) ============ -->
  <div id="login-gate" class="login-gate">
    <div class="login-card">
      <div class="brand-mark" style="font-size:40px">🐾</div>
      <h2>Groomingdale</h2>
      <div class="muted" style="margin-bottom:16px">Enter your name and PIN to continue</div>
      <form id="login-form">
        <input id="login-name" type="text" placeholder="Your name (or App Owner)" autocomplete="username" autofocus style="margin-bottom:10px">
        <input id="login-pin" type="password" inputmode="numeric" placeholder="PIN" autocomplete="current-password">
        <div id="login-error" class="login-error" hidden></div>
        <button type="submit" id="login-btn" class="btn primary block" style="margin-top:12px">Enter</button>
      </form>
    </div>
  </div>

  <!-- ============ APP CHROME (hidden until signed in) ============ -->
  <div id="app-shell" hidden>
    <header class="topbar">
      <div class="brand" data-nav="home">
        <img class="brand-logo" src="logo.jpg" alt="Groomingdale">
      </div>
      <nav class="topnav" id="topnav">
        <button class="nav-btn" data-nav="home">Home</button>
        <button class="nav-btn" data-nav="pets">Pets</button>
        <button class="nav-btn" data-nav="bookings">Bookings</button>
        <button class="nav-btn" data-nav="schedule">Schedule</button>
        <button class="nav-btn" data-nav="financial">Financial</button>
        <button class="nav-btn" data-nav="groomers">Groomers</button>
        <button class="nav-btn" data-nav="admins">Admins</button>
        <button class="nav-btn" data-nav="calendar">Calendar</button>
      </nav>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menu">☰</button>
      <button class="btn ghost sm" id="logout-btn">Log out</button>
    </header>

    <div id="gcal-banner" class="gcal-banner" hidden>
      <span>📅 Google Calendar isn't connected in this browser — bookings won't sync until you connect.</span>
      <div class="row" style="gap:8px">
        <button class="btn sm primary" id="gcal-banner-connect">Connect</button>
        <button class="icon-btn" id="gcal-banner-dismiss" aria-label="Dismiss">✕</button>
      </div>
    </div>

    <main id="view" class="view"><!-- views render here --></main>
  </div>

  <!-- ============ MODAL HOST ============ -->
  <div id="modal-host" class="modal-host" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-x" data-close-modal aria-label="Close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- ============ TOAST ============ -->
  <div id="toast" class="toast" hidden></div>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="calendar.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
